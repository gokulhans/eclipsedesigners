                            <input required name="name" type="text" class="form-control" placeholder="Joe Bloggs" />
                        </label>

                        <label class="d-block mb-4">
                            <span class="form-label d-block"><b>Email Address</b></span>
                            <input required name="email" type="email" class="form-control"
                                placeholder="joe.bloggs@example.com" />
                        </label>


                        <label class="d-block mb-4">
                            <span class="form-label d-block"><b>Phone</b></span>

                        <label class="d-block mb-4">

                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="form-check">
                                    <input type="radio" class="form-check-input" name="Qualification" value="Graduation" />
                                    <span class="form-check-label">Graduation</span>
                                </label>
                            </div>
                            <div>
                                <label class="form-check">
                                    <input type="radio" class="form-check-input" name="Qualification" value="Post-Graduation" />
                                    <span class="form-check-label">Post Graduation</span>
                                </label>
                            </div>
                        </div>

                        <div class="mb-4">
                            <span class="form-label d-block"><b>JOB Post</b></span>
                            <div>
                                <div class="form-check">
                                    <label class="d-block">
                                        <input type="checkbox" class="form-check-input" name="Graphic-Designer" value="yes" />
                                        <span class="form-check-label">Graphic Designer</span>
                                    </label>
                                </div>
                            </div>
                            <div>
                                <label class="form-check">
                                    <input type="checkbox" class="form-check-input" name="PPC-Specialist" value="yes" />
                                    <span class="form-check-label">PPC Specialist</span>

                            </div>
                            <div>

                            <div>

                                </label>
                            </div>
                            <div>

                            <div>

                            <div>

                            <div>

                        <label class="d-block mb-4">
